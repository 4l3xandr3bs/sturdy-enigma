<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Animal</title>
</head>
<body>
    <h2>Cadastro de Animal</h2>

    <form th:action="@{/Animais/salvar}" th:object="${animal}" method="post">
        
        <label>Nome:</label>
        <input type="text" th:field="*{nomeAnimal}" required />
        <br><br>

        <label>Idade:</label>
        <input type="number" th:field="*{idadeAnimal}" required />
        <br><br>

        <label>Raça:</label>
        <input type="text" th:field="*{racaAnimal}" required />
        <br><br>

        <label>Tutor:</label>
        <select th:field="*{tutor.idTutor}" required>
            <option value="">-- Selecione um Tutor --</option>
            <option th:each="tutor : ${tutores}" 
                    th:value="${tutor.idTutor}" 
                    th:text="${tutor.nomeTutor}">
            </option>
        </select>
        <br><br>

        <button type="submit">Cadastrar</button>
    </form>

    <br>
    <a th:href="@{/Animais/listar}">Listar Animais</a>
</body>
</html>
