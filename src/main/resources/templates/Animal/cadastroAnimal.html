<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Animal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>
<body>
  <div class="container">
    <div class="row justify-content-center md-4">
    <h2>Cadastro de Animal</h2>
    </div>
   
    <form th:action="@{/animais/salvar}" th:object="${animal}" method="post">
        <input type="hidden" th:field="*{idAnimal}"/>
        <div class="form-group">
        <label>Nome:</label>
        <input type="text" class="form-control"th:field="*{nomeAnimal}" required />
        <br><br>
        </div>
        <div class="form-group">
        <label>Idade:</label>
        <input type="number" class="form-control"th:field="*{idadeAnimal}" required />
        <br><br>
        </div>
        <div class="form-group">
        <label>Raça:</label>
        <input type="text" class="form-control"th:field="*{racaAnimal}" required />
        <br><br>
        </div>
        <div class="form-group">
            <label for="tutorSelect" class="form-label">Tutor:</label>
            <select  th:field="*{tutor}" class="form-select" required>
                <option value="">-- Selecione um Tutor --</option>
                <option th:each="tutor : ${tutores}" 
                        th:value="${tutor.idTutor}" 
                        th:text="${tutor.nomeTutor}">
                </option>
            </select>
        <br><br>
    </div>
        <button type="submit" class="btn btn-success">Cadastrar</button>
    </form>

</div>
    <br>
    <a th:href="@{/animais/listar}">Listar Animais</a>
</body>
</html>
