<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Página Listar Tutores</title>
</head>
<body>
    <h2>Lista de Tutores</h2>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Telefone</th>
        <th>Endereço</th>

       
    </tr>

    <tr th:each="tutor : ${tutores}">
        <td th:text="${tutor.idTutor}"></td>
        <td th:text="${tutor.nomeTutor}"></td>
        <td th:text="${tutor.telefoneTutor}"></td>
        <td th:text="${tutor.enderecoTutor}"></td>
        <td>
            <a th:href="@{/Tutores/editar/{id}(id=${tutor.idTutor})}">Editar</a>
                <a th:href="@{/Tutores/excluir/{id}(id=${tutor.idTutor})}"
                >Excluir</a>
        </td>
    </tr>

</table>

<br>
<a th:href="@{/Tutores/Criar}">Novo Tutor</a>
<a th:href="@{/Animais/formCadastrar}">Novo Animal</a>
</body>
</html>
