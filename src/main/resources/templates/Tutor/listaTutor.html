<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Página Listar Tutores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>
<body>
    <h2>Lista de Tutores</h2>

    <table border="1" class="table">
        <thead class="thead-dark">
        <tr>
            <th scope="col">ID</th>
            <th scope="col">Nome</th>
            <th scope="col">Telefone</th>
            <th scope="col">Endereço</th>
            <th scope="col">Ações</th>
        </tr>
    </thead>
        <tr th:each="tutor : ${tutores}">
            <td th:text="${tutor.idTutor}"></td>
            <td th:text="${tutor.nomeTutor}"></td>
            <td th:text="${tutor.telefoneTutor}"></td>
            <td th:text="${tutor.enderecoTutor}"></td>
            <td>
                <a th:href="@{/tutores/editar/{id}(id=${tutor.idTutor})}">Editar</a>
                <a th:href="@{/tutores/excluir/{id}(id=${tutor.idTutor})}" onclick="return confirm('Deseja realmente excluir este Tutor?')">Excluir</a>
            </td>
        </tr>
    </table>

    <br>
    <a th:href="@{/tutores/criar}">Novo Tutor</a>
    <a th:href="@{/animais/criar}">Novo Animal</a>
</body>
</html>
