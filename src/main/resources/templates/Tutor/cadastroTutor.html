<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Tutor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>
<body>
    <div class="container">
    <h2>Cadastro de Tutor</h2>
    <div class="row justify-content-center  md-4">
    <form th:action="@{/tutores/salvar}" th:object="${tutor}" method="post">
        <input type="hidden" th:field="*{idTutor}" />
        <label>Nome:</label>
        <input type="text" class="form-control" th:field="*{nomeTutor}" required />
        <br><br>

        <label>Telefone:</label>
        <input type="number" class="form-control" th:field="*{telefoneTutor}" required />
        <br><br>

        <label>Endereço:</label>
        <input type="text" class="form-control" th:field="*{enderecoTutor}" required />
        <br><br>
    </div>
        <button type="submit" class="btn btn-success">Cadastrar</button>
    </form>
</div>
    <br>
    <a th:href="@{/tutores/listar}" class="btn btn-outline-primary">Listar Tutores</a>
</body>
</html>
